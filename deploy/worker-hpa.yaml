apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: turing-worker
  namespace: turing-cluster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: turing-worker
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when average CPU across pods exceeds 70%.
          # Workers pin a core while running a machine, so this tracks
          # real load accurately.
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      # Be conservative scaling down — in-flight TM runs can take minutes.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

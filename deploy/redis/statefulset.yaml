apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: turing-redis
  namespace: turing-cluster
  labels:
    app: turing-redis
spec:
  serviceName: turing-redis
  replicas: 1
  selector:
    matchLabels:
      app: turing-redis
  template:
    metadata:
      labels:
        app: turing-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999   # redis user in the official image
        runAsGroup: 999
        fsGroup: 999      # make the PVC group-writable so AOF/RDB can be written
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "/etc/redis/redis.conf"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true  # only /data (PVC) and /etc/redis (config) are written
            capabilities:
              drop:
                - ALL
      volumes:
        - name: config
          configMap:
            name: turing-redis-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

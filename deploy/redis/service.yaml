apiVersion: v1
kind: Service
metadata:
  name: turing-redis
  namespace: turing-cluster
  labels:
    app: turing-redis
spec:
  # Headless: gives the StatefulSet pod a stable DNS name
  # (turing-redis-0.turing-redis.turing-cluster.svc). Clients can also just use
  # the service name turing-redis, which resolves to the single pod.
  clusterIP: None
  selector:
    app: turing-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP

apiVersion: v1
kind: ConfigMap
metadata:
  name: turing-redis-config
  namespace: turing-cluster
  labels:
    app: turing-redis
data:
  redis.conf: |
    # Persist to the mounted PVC so un-acked work and champion state survive a
    # pod restart. AOF (append-only file) is the durable log; RDB snapshots are
    # left on as a periodic fallback.
    dir /data
    appendonly yes
    appendfsync everysec
    # Bind to all interfaces inside the pod network; the Service fronts access.
    bind 0.0.0.0
    protected-mode no

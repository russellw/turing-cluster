apiVersion: apps/v1
kind: Deployment
metadata:
  name: turing-pushgateway
  namespace: turing-cluster
  labels:
    app: turing-pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: turing-pushgateway
  template:
    metadata:
      labels:
        app: turing-pushgateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pushgateway
          image: prom/pushgateway:v1.11.1
          ports:
            - name: http
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: turing-pushgateway
  namespace: turing-cluster
  labels:
    app: turing-pushgateway
spec:
  type: ClusterIP
  selector:
    app: turing-pushgateway
  ports:
    - name: http
      port: 9091
      targetPort: http
      protocol: TCP

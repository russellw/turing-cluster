apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: turing-pushgateway
  namespace: turing-cluster
  labels:
    app: turing-pushgateway
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: turing-pushgateway
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      # Keep the job/instance labels the coordinator pushed, rather than
      # overwriting them with the pushgateway's own.
      honorLabels: true
